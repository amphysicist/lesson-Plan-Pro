<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Global error handler to silence persistent "fetch" property errors
      window.addEventListener('error', function(event) {
        if (event.message && (event.message.indexOf('Cannot set property fetch') !== -1 || event.message.indexOf('set fetch') !== -1)) {
          event.stopImmediatePropagation();
          event.preventDefault();
          console.debug('Silenced fetch property error:', event.message);
          return true;
        }
      }, true);

      // Attempt to make window.fetch "resilient" to polyfill attempts
      try {
        const originalFetch = window.fetch;
        if (originalFetch) {
          Object.defineProperty(window, 'fetch', {
            get: () => originalFetch,
            set: () => console.debug('Blocked overwrite of window.fetch'),
            configurable: true,
            enumerable: true
          });
        }
      } catch (e) {
        // Fallback for non-configurable environments
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
